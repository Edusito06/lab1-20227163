<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .plato-item {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 8px;
            background-color: #fff;
        }
        .plato-item:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width: 750px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Nuevo Pedido</h2>
        <a href="/orders/history" class="btn btn-secondary btn-sm">Ver historial</a>
    </div>
    <hr>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/orders/create}" method="post" th:object="${orderForm}">

        <div class="mb-3">
            <label class="form-label">Nombre del cliente</label>
            <input type="text" class="form-control" th:field="*{customerName}" placeholder="Ej: Juan Pérez">
        </div>

        <div class="mb-3">
            <label class="form-label">Tipo de servicio</label>
            <select class="form-select" th:field="*{serviceType}">
                <option value="PARA_LLEVAR">Para llevar</option>
                <option value="EN_MESA">En mesa</option>
            </select>
        </div>

        <h5>Menú disponible</h5>
        <p class="text-muted small">Selecciona uno o más platos:</p>

        <div th:each="dish : ${dishes}" class="plato-item">
            <div class="form-check">
                <input class="form-check-input" type="checkbox"
                       th:field="*{dishIds}"
                       th:value="${dish.id}"
                       th:id="'dish-' + ${dish.id}">
                <label class="form-check-label" th:for="'dish-' + ${dish.id}">
                    <strong th:text="${dish.name}"></strong>
                    <span class="text-muted ms-2" th:text="'[' + ${dish.category.displayName} + ']'"></span>
                    <br>
                    <small>Precio: S/ <span th:text="${dish.price}"></span>
                        &nbsp;|&nbsp; Tiempo: <span th:text="${dish.prepTime}"></span> min</small>
                </label>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">Registrar pedido</button>
            <a href="/orders/history" class="btn btn-outline-dark ms-2">Ir al historial</a>
        </div>

    </form>
</div>
</body>
</html>
