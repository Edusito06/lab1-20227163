<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Pedido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width: 750px;">

    <h2>Detalle del Pedido #<span th:text="${order.id}"></span></h2>
    <hr>

    <div th:if="${msg == 'creado'}" class="alert alert-success">Pedido registrado correctamente.</div>
    <div th:if="${msg == 'avanzado'}" class="alert alert-info">Estado actualizado.</div>

    <div class="card mb-3">
        <div class="card-body">
            <p><strong>Cliente:</strong> <span th:text="${order.customerName}"></span></p>
            <p><strong>Servicio:</strong> <span th:text="${order.serviceType}"></span></p>
            <p><strong>Tiempo estimado:</strong> <span th:text="${order.totalTime}"></span> min</p>
            <p><strong>Total:</strong> S/ <span th:text="${order.totalPrice}"></span></p>
            <p><strong>Estado:</strong>
                <span class="badge"
                      th:classappend="'bg-' + ${order.status.badgeColor}"
                      th:text="${order.status.displayName}">
                </span>
            </p>
        </div>
    </div>

    <h5>Platos del pedido</h5>
    <table class="table table-bordered table-sm bg-white">
        <thead class="table-secondary">
            <tr>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Precio</th>
                <th>Preparación</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="dish : ${order.dishes}">
                <td th:text="${dish.name}"></td>
                <td th:text="${dish.category.displayName}"></td>
                <td>S/ <span th:text="${dish.price}"></span></td>
                <td th:text="${dish.prepTime} + ' min'"></td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <!-- Solo se muestra si el pedido aún no fue entregado -->
        <form th:action="@{/orders/{id}/advance(id=${order.id})}" method="post" class="d-inline">
            <button type="submit" class="btn btn-primary"
                    th:disabled="${order.status.last}">
                Avanzar estado
            </button>
        </form>
        <a href="/orders/new" class="btn btn-outline-secondary ms-2">Nuevo pedido</a>
        <a href="/orders/history" class="btn btn-outline-secondary ms-2">Historial</a>
    </div>

</div>
</body>
</html>
