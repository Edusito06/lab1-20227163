<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Pedidos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Historial de Pedidos</h2>
        <a href="/orders/new" class="btn btn-success btn-sm">+ Nuevo pedido</a>
    </div>
    <hr>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-warning">
        Aún no hay pedidos registrados.
    </div>

    <table th:if="${!#lists.isEmpty(orders)}" class="table table-striped table-hover bg-white">
        <thead>
            <tr>
                <th>#</th>
                <th>Cliente</th>
                <th>Servicio</th>
                <th>Total (S/)</th>
                <th>Tiempo</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.customerName}"></td>
                <td th:text="${order.serviceType}"></td>
                <td th:text="${order.totalPrice}"></td>
                <td th:text="${order.totalTime} + ' min'"></td>
                <td>
                    <span class="badge"
                          th:classappend="'bg-' + ${order.status.badgeColor}"
                          th:text="${order.status.displayName}">
                    </span>
                </td>
                <td>
                    <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                        Ver detalle
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
